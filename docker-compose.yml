services:
  mongodb:
    image: mongo:latest
    container_name: pdl-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: pdl-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb

volumes:
  mongo_data: